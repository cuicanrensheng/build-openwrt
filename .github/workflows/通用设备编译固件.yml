        run: |运行: |运行: |运行: |运行: |运行: |运行: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk gettext git subversion libssl-dev libelf-devsudo apt-get install -y build-essential libncurses5-dev gawk gettext git subversion libssl-dev libelf-dev 

      - name: 拉取 ImmortalWrt 源码
        run: |运行: |运行: |行: 行运行:|
